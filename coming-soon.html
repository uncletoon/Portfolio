<!doctype html>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Coming Soon - Patience</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="nav-bar">
      <div class="container nav-container">
        <div class="logo">
          <img src="images/Screenshot 2026-04-03 215247.png" alt="Logo" />
        </div>

        <div class="nav-links">
          <a href="index.html#home" class="link">Home</a>
          <a href="index.html#about" class="link">About</a>
          <a href="index.html#services" class="link">Services</a>
          <a href="blog.html" class="link">Blog</a>

        </div>
        <div class="nav-actions">
          <button class="theme-toggle" aria-label="Toggle Theme">
            <img id="theme-icon" src="images/mode.png" alt="Toggle Theme" />
          </button>
          <button class="menu-toggle" aria-label="Toggle Menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Coming Soon Section -->
    <section class="hero coming-soon-hero">
      <div class="container">
        <div class="coming-soon-content text-center">
          <h1 class="coming-soon-title">Exciting Content is on its Way!</h1>
          <p class="coming-soon-text">

            soon for the full article!
          </p>
          <div class="btn-group coming-soon-btn">
            <a href="blog.html" class="btn btn-primary">Back to Blog</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <div class="container footer-container">
        <div class="social-links">
          <a href="#" aria-label="Facebook">
            <img
              src="images/facebook-round-color-icon.png"
              alt="Facebook"
              style="width: 30px; height: auto"
            />
          </a>
          <a href="#" aria-label="Instagram">
            <img
              src="images/ig-instagram-icon.png"
              alt="Instagram"
              style="width: 30px; height: auto"
            />
          </a>
          <a href="https://github.com/uncletoon" aria-label="GitHub">

              src="images/github-icon.png"
              alt="GitHub"
              style="width: 30px; height: auto"
